<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Innovation Lab</title>
    <style>
        :root {
            --cyan: #00e5ff;
            --black: #000000;
            --gray-bg: #f5f5f5;
        }

        body {
            margin: 0;
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: white;
            color: var(--black);
            overflow-x: hidden;
        }

        /* --- Navigation --- */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 50px;
            text-transform: uppercase;
            font-weight: 600;
            letter-spacing: 2px;
            font-size: 14px;
        }

        .logo { font-size: 18px; font-weight: 800; }

        .nav-links { display: flex; gap: 30px; }
        .nav-links a { text-decoration: none; color: var(--black); }

        .login-btn {
            background: #ededed;
            padding: 8px 30px;
            border-radius: 4px;
            text-decoration: none;
            color: var(--black);
        }

        /* --- Hero Section --- */
        .hero {
            text-align: center;
            padding: 40px 20px;
            position: relative;
        }

        .welcome-tag {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-size: 12px;
            letter-spacing: 4px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .square { width: 12px; height: 12px; background: var(--cyan); }

        .hero h1 {
            font-size: clamp(40px, 8vw, 90px);
            margin: 0;
            font-weight: 900;
            letter-spacing: -2px;
            line-height: 1;
        }

        .hero h1 span.highlight { color: var(--cyan); }

        .hero-btns {
            margin-top: 30px;
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        .btn {
            background: var(--black);
            color: white;
            padding: 12px 35px;
            border-radius: 5px;
            text-decoration: none;
            text-transform: uppercase;
            font-size: 12px;
            font-weight: bold;
            letter-spacing: 2px;
        }

        /* Decorative Elements */
        .decoration-left {
            position: absolute;
            left: 50px;
            bottom: 0;
            display: flex;
            align-items: flex-end;
            gap: 8px;
        }
        .bar { width: 15px; background: var(--cyan); }
        .decoration-right {
            position: absolute;
            right: 50px;
            bottom: 0;
            width: 80px;
        }

        /* --- Carousel Section --- */
        .carousel-container {
            margin-top: 50px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .carousel-row {
            display: flex;
            overflow-x: auto;
            gap: 15px;
            padding: 0 20px;
            scroll-snap-type: x mandatory;
            scrollbar-width: none; /* Hide scrollbar Firefox */
        }

        .carousel-row::-webkit-scrollbar { display: none; } /* Hide scrollbar Chrome */

        .carousel-item {
            flex: 0 0 300px;
            height: 400px;
            scroll-snap-align: start;
            border-radius: 4px;
            overflow: hidden;
        }

        .carousel-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* --- Scrolling Text Bottom --- */
        .marquee {
            margin-top: 60px;
            overflow: hidden;
            white-space: nowrap;
            background: white;
            padding: 20px 0;
        }

        .marquee-content {
            display: inline-block;
            font-size: 120px;
            font-weight: 900;
            color: #eeeeee;
            text-transform: uppercase;
            animation: scroll 20s linear infinite;
        }

        @keyframes scroll {
            from { transform: translateX(0); }
            to { transform: translateX(-50%); }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .nav-links, .decoration-left, .decoration-right { display: none; }
            .hero h1 { font-size: 50px; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">LOGO</div>
        <div class="nav-links">
            <a href="#">Home</a>
            <a href="#">Lab</a>
            <a href="#">Events</a>
            <a href="#">About</a>
            <a href="#">Contact</a>
        </div>
        <a href="#" class="login-btn">LOGIN</a>
    </nav>

    <header class="hero">
        <div class="welcome-tag">
            <div class="square"></div>
            WELCOME TO
            <div class="square"></div>
        </div>
        <h1>INN<span class="highlight">O</span>VATI<span class="highlight">O</span>N LAB</h1>
        
        <div class="hero-btns">
            <a href="#" class="btn">Explore</a>
            <a href="#" class="btn">News</a>
        </div>

        <div class="decoration-left">
            <div class="bar" style="height: 20px; opacity: 0.5;"></div>
            <div class="bar" style="height: 40px; opacity: 0.8;"></div>
            <div class="bar" style="height: 60px;"></div>
        </div>
        <div class="decoration-right">
            <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M0 100 C0 44.77 44.77 0 100 0 L100 100 Z" fill="black"/>
                <circle cx="20" cy="80" r="20" fill="var(--cyan)"/>
            </svg>
        </div>
    </header>

    <div class="carousel-container">
        <div class="carousel-row">
            <div class="carousel-item"><img src="https://picsum.photos/seed/1/400/600" alt="Sunset"></div>
            <div class="carousel-item"><img src="https://picsum.photos/seed/2/400/600" alt="Digital Art"></div>
            <div class="carousel-item"><img src="https://picsum.photos/seed/3/400/600" alt="Nature Runner"></div>
            <div class="carousel-item"><img src="https://picsum.photos/seed/4/400/600" alt="Kayaking"></div>
            <div class="carousel-item"><img src="https://picsum.photos/seed/5/400/600" alt="Forest"></div>
        </div>
        <div class="carousel-row">
            <div class="carousel-item"><img src="https://picsum.photos/seed/6/400/600" alt="Garden"></div>
            <div class="carousel-item"><img src="https://picsum.photos/seed/7/400/600" alt="Technology Touch"></div>
            <div class="carousel-item"><img src="https://picsum.photos/seed/8/400/600" alt="Vibrant Leaves"></div>
            <div class="carousel-item"><img src="https://picsum.photos/seed/9/400/600" alt="Abstract"></div>
            <div class="carousel-item"><img src="https://picsum.photos/seed/10/400/600" alt="Mountain"></div>
        </div>
    </div>

    <div class="marquee">
        <div class="marquee-content">
            INNOVATION LAB INNOVATION LAB INNOVATION LAB INNOVATION LAB INNOVATION LAB INNOVATION LAB 
        </div>
    </div>

</body>
</html>
